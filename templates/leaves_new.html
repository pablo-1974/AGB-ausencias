{% extends "base.html" %}
{% block content %}
<h1 class="text-lg font-semibold mb-4">Abrir baja</h1>

{# Mensajes de error/éxito opcionales #}
{% if error %}
  <div class="mb-4 p-3 rounded bg-red-100 text-red-700">{{ error }}</div>
{% endif %}
{% if info %}
  <div class="mb-4 p-3 rounded bg-green-100 text-green-700">{{ info }}</div>
{% endif %}

<form method="post" action="/leaves/new" class="card space-y-3 max-w-xl">
  <div>
    <label class="label">Profesor</label>
    <select name="teacher_id" class="input" required>
      <option value="">-- seleccionar --</option>
      {% for t in teachers or [] %}
        <option value="{{ t.id }}">{{ t.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label class="label">Fecha de inicio</label>
    <input class="input" type="date" name="start_date" required>
  </div>

  <div>
    <label class="label">Tipo</label>
    <select name="leave_type" class="input" required>
      <option value="baja">Baja</option>
      <option value="excedencia">Excedencia</option>
    </select>
  </div>

  <div>
    <label class="label">Causa (obligatoria)</label>
    <input class="input" type="text" name="cause" placeholder="Describe la causa" required>
  </div>

  <button class="btn-primary">Abrir baja</button>
</form>
{% endblock %}
