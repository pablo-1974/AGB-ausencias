{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Editar baja</h2>

<form method="post" class="space-y-4">

  <div>
    <label class="label">Profesor</label>
    <div class="input w-full py-2 px-3 bg-gray-100">
      {{ teacher.name }}
    </div>
  </div>

  <div>
    <label class="label">Fecha inicio</label>
    <input type="date" name="start_date"
           class="input w-full py-2 px-3"
           value="{{ leave.start_date }}">
  </div>

  <div>
    <label class="label">Fecha fin</label>
    <input type="date" name="end_date"
           class="input w-full py-2 px-3"
           value="{{ leave.end_date }}">
  </div>

  <div>
    <label class="label">Motivo</label>
    <textarea name="reason"
              class="input w-full py-2 px-3">{{ leave.cause }}</textarea>
  </div>

  <div class="flex justify-end gap-3">
    <a href="/leaves/admin" class="btn-muted">Cancelar</a>
    <button type="submit" class="btn-primary">Guardar cambios</button>
  </div>

</form>

{% endblock %}
