{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-10">

  <h1 class="text-2xl font-bold mb-6">Copia de Seguridad</h1>

  <!-- Descargar -->
  <a href="/admin/backup/download">
    <button class="w-full p-4 rounded-lg font-semibold"
            style="background-color:#66FF66;">
      Descargar copia completa (Excel)
    </button>
  </a>

  <!-- Vaciar tablas -->
  <a href="/admin/backup/clear">
    <button class="w-full p-4 rounded-lg font-semibold"
            style="background-color:#66FF66;">
      Vaciar tablas (seleccionar)
    </button>
  </a>

  <!-- Cargar copia -->
  <form action="/admin/backup/load" method="POST" enctype="multipart/form-data"
        onsubmit="return confirm('¿Seguro que deseas cargar esta copia? Se sobrescribirán datos.')">
    <input type="file" name="backup_file" required class="mb-4">
    <button class="w-full p-4 rounded-lg font-semibold"
            style="background-color:#66FF66;">
      Cargar copia de seguridad (Excel)
    </button>
  </form>

</div>
{% endblock %}
