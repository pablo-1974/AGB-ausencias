{% extends "base.html" %}
{% block content %}

<h1 class="text-lg font-semibold mb-4">Iniciar sustitución</h1>

{% if error %}
  <div class="mb-4 p-3 rounded bg-red-100 text-red-700">{{ error }}</div>
{% endif %}
{% if info %}
  <div class="mb-4 p-3 rounded bg-green-100 text-green-700">{{ info }}</div>
{% endif %}

<form method="post" action="/substitutions/new" class="card grid gap-4 max-w-2xl">
  <!-- Profesor a sustituir -->
  <div>
    <label class="label">Profesor a sustituir</label>
    <select name="teacher_id" class="input" required>
      <option value="">-- seleccionar --</option>
      {% for item in open_leaves %}
        <option value="{{ item.teacher_id }}">
          {{ item.teacher_name }} (desde {{ item.start_date }})
        </option>
      {% endfor %}
    </select>
    <p class="text-xs text-gray-500 mt-1">
      Profesores en baja/excedencia que aún no tienen sustituto.
    </p>
  </div>

  <!-- Fecha inicio sustitución -->
  <div>
    <label class="label">Fecha de inicio de la sustitución</label>
    <input class="input" type="date" name="start_date" required>
  </div>

  <!-- Modo sustituto -->

  <div x-data="{ mode: '' }" class="space-y-3">
    <label class="label">Profesor sustituto</label>

    <div class="flex items-center gap-6">
      <label class="flex items-center gap-2">
        <input type="radio" name="sub_mode" value="exprof" x-model="mode" required>
        <span>Elegir exprofe</span>
      </label>
      <label class="flex items-center gap-2">
        <input type="radio" name="sub_mode" value="new" x-model="mode" required>
        <span>Profesor nuevo</span>
      </label>
    </div>

    <!-- Exprofes -->
    <div x-show="mode === 'exprof'" x-cloak>
      <label class="label">Selecciona exprofe</label>
      <select
        class="input"
        x-bind:name="mode === 'exprof' ? 'exprof_teacher_id' : null"
        :disabled="mode !== 'exprof'"
        :required="mode === 'exprof'">
        <option value="">-- seleccionar exprofe --</option>
        {% for t in exprofes %}
          <option value="{{ t.id }}">{{ t.name }}{% if t.alias %} ({{ t.alias }}){% endif %}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Profesor nuevo -->
    <div x-show="mode === 'new'" x-cloak class="grid md:grid-cols-3 gap-3">
      <div>
        <label class="label">Nombre completo</label>
        <input class="input"
               type="text"
               x-bind:name="mode === 'new' ? 'new_name' : null"
               :disabled="mode !== 'new'"
               :required="mode === 'new'">
      </div>
      <div>
        <label class="label">Email</label>
        <input class="input"
               type="email"
               x-bind:name="mode === 'new' ? 'new_email' : null"
               :disabled="mode !== 'new'"
               :required="mode === 'new'">
      </div>
      <div>
        <label class="label">Alias</label>
        <input class="input"
               type="text"
               x-bind:name="mode === 'new' ? 'new_alias' : null"
               :disabled="mode !== 'new'"
               :required="mode === 'new'">
      </div>
    </div>
  </div>


  <div>
    <button class="btn-primary">Iniciar sustitución</button>
  </div>
</form>

{% endblock %}
