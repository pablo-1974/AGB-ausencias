{% extends "base.html" %}
{% block content %}

<div class="max-w-4xl mx-auto mt-6 space-y-10">

  <h2 class="text-2xl font-bold mb-4">Editar calendario escolar</h2>

  <!-- TARJETA PRINCIPAL -->
  <div class="bg-white rounded-xl shadow p-6">

    <!-- FORMULARIO PRINCIPAL -->
    <form method="post" class="space-y-6">

      <!-- Año escolar -->
      <div>
        <label class="font-medium">Año escolar</label>
        <input type="text" name="school_year"
               class="mt-1 w-full border rounded p-2"
               value="{{ calendar.school_year }}"
               required>
      </div>

      <!-- Fechas curso -->
      <div>
        <label class="font-medium">Curso escolar</label>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">

          <div>
            <label class="text-sm text-gray-600">Primer día</label>
            <input type="date" name="first_day"
                   class="mt-1 w-full border rounded p-2"
                   value="{{ calendar.first_day.strftime('%Y-%m-%d') }}"
                   required>
          </div>

          <div>
            <label class="text-sm text-gray-600">Último día</label>
            <input type="date" name="last_day"
                   class="mt-1 w-full border rounded p-2"
                   value="{{ calendar.last_day.strftime('%Y-%m-%d') }}"
                   required>
          </div>

        </div>
      </div>

      <!-- NAVIDAD -->
      <div>
        <label class="font-medium">Vacaciones de Navidad</label>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">

          <div>
            <label class="text-sm text-gray-600">Inicio</label>
            <input type="date" name="xmas_start"
                   class="mt-1 w-full border rounded p-2"
                   value="{{ calendar.xmas_start.strftime('%Y-%m-%d') }}"
                   required>
          </div>

          <div>
            <label class="text-sm text-gray-600">Fin</label>
            <input type="date" name="xmas_end"
                   class="mt-1 w-full border rounded p-2"
                   value="{{ calendar.xmas_end.strftime('%Y-%m-%d') }}"
                   required>
          </div>

        </div>
      </div>

      <!-- SEMANA SANTA -->
      <div>
        <label class="font-medium">Vacaciones de Semana Santa</label>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">

          <div>
            <label class="text-sm text-gray-600">Inicio</label>
            <input type="date" name="easter_start"
                   class="mt-1 w-full border rounded p-2"
                   value="{{ calendar.easter_start.strftime('%Y-%m-%d') }}"
                   required>
          </div>

          <div>
            <label class="text-sm text-gray-600">Fin</label>
            <input type="date" name="easter_end"
                   class="mt-1 w-full border rounded p-2"
                   value="{{ calendar.easter_end.strftime('%Y-%m-%d') }}"
                   required>
          </div>

        </div>
      </div>


      <!-- GUARDAR -->
      <div>
        <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
          Guardar cambios
        </button>
      </div>

    </form>

  </div>

  <!-- =============================================== -->
  <!--             FESTIVOS INDIVIDUALES              -->
  <!-- =============================================== -->
  <div class="bg-white rounded-xl shadow p-6">

    <h3 class="text-xl font-semibold mb-4">Festivos individuales</h3>

    {% if calendar.other_holidays %}
      <table class="min-w-full border rounded-lg overflow-hidden text-sm bg-white">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-4 py-2 text-left font-semibold">Fecha</th>
            <th class="px-4 py-2 text-left font-semibold">Acciones</th>
          </tr>
        </thead>
        <tbody>
          {% for h in calendar.other_holidays %}
          <tr class="border-b">
            <td class="px-4 py-2">{{ h }}</td>
            <td class="px-4 py-2">

              <form action="/config/calendar/delete-holiday" method="post" class="inline">
                <input type="hidden" name="holiday_date" value="{{ h }}">
                <button class="text-red-600 hover:text-red-800">
                  Borrar
                </button>
              </form>

            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p class="text-gray-600 mb-4">
        No hay festivos individuales registrados.
      </p>
    {% endif %}

    <!-- FORMULARIO: Añadir festivo -->
    <form action="/config/calendar/add-holiday" method="post"
          class="mt-6 flex flex-col sm:flex-row gap-4 items-start sm:items-end">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Añadir festivo</label>
        <input type="date" name="holiday_date"
               class="border rounded p-2"
               required>
      </div>

      <button class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
        Añadir
      </button>

    </form>

  </div>

</div>

{% endblock %}
