{% extends "base.html" %}
{% block content %}

<div class="max-w-3xl mx-auto mt-6">

  <h2 class="text-2xl font-bold mb-6">Iniciar baja o excedencia</h2>

  {% if error %}
    <div class="bg-red-100 text-red-700 border border-red-300 p-3 rounded mb-4">
      {{ error }}
    </div>
  {% endif %}

  <form method="post" class="space-y-6">

    <div>
      <label class="font-semibold">Profesor</label>
      <select name="teacher_id" class="w-full border p-2 rounded" required>
        <option value="" selected disabled>Selecciona un profesor</option>
        {% for t in teachers %}
          <option value="{{ t.id }}">{{ t.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="font-semibold">Fecha inicio</label>
      <input type="date" name="start_date" required class="border p-2 rounded w-full">
    </div>

    <div>
      <label class="font-semibold">Tipo</label>
      <select name="leave_type" class="border p-2 rounded w-full">
        <option value="" selected disabled>Selecciona tipo</option>
        <option value="baja">Baja</option>
        <option value="excedencia">Excedencia</option>
      </select>
    </div>

    <div>
      <label class="font-semibold">Causa</label>
      <input type="text" name="cause" required class="border p-2 rounded w-full">
    </div>

    <div>
      <label class="font-semibold">Categoría (A–L)</label>
      <input type="text" maxlength="1" name="category" 
             class="border p-2 rounded w-full">
    </div>

    <button class="bg-blue-600 text-white px-4 py-2 rounded">Guardar</button>

  </form>

</div>

{% endblock %}
