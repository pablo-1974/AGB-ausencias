{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Editar profesor</h2>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<!-- FORMULARIO PRINCIPAL (EDITAR) -->
<form method="post" class="mb-4">

    <!-- Nombre -->
    <div>
        <label for="inpName" class="form-label">Nombre</label>
        <input
            id="inpName"
            name="name"
            type="text"
            class="input w-full text-lg py-2 px-3"
            value="{{ teacher.name }}"
            required
        >
    </div>

    <!-- Email -->
    <div>
        <label for="inpEmail" class="form-label">Email</label>
        <input
            id="inpEmail"
            name="email"
            type="email"
            class="input w-full text-lg py-2 px-3"
            value="{{ teacher.email or '' }}"
        >
    </div>

    <!-- Alias -->
    <div class="mb-3">
        <label for="inpAlias" class="form-label">Alias</label>
        <input
            id="inpAlias"
            name="alias"
            type="text"
            class="input w-full text-lg py-2 px-3"
            value="{{ teacher.alias or '' }}"
        >
    </div>


    <!-- Estado -->
    <div>
      <label for="selStatus" class="label">Estado</label>
      <select id="selStatus" name="status" class="input w-full text-lg py-2 px-3">
        {% for st in estados %}
        <option value="{{ st.name }}" {% if teacher.status == st %}selected{% endif %}>
          {{ st.name }}
        </option>
        {% endfor %}
      </select>
    </div>


    <!-- Titular -->
    <div class="form-check mb-4">
        <input
            class="form-check-input"
            type="checkbox"
            id="chkTitular"
            name="titular"
            {% if teacher.titular %}checked{% endif %}
        >
        <label for="chkTitular" class="form-check-label">
            Titular
        </label>
    </div>

    
    <!-- BOTONES -->
    <div class="flex gap-3 justify-end">

      <!-- Cancelar -->
      <a href="/teachers/admin" class="btn-muted">Cancelar</a>

      <!-- Guardar -->
      <button type="submit" class="btn-primary">
        Guardar cambios
      </button>


</form>


<!-- FORMULARIO SECUNDARIO: MARCAR EXPROFE -->
<form method="post" action="/teachers/delete/{{ teacher.id }}">
    <button type="submit" class="btn btn-danger">
        Marcar como Exprofesor
    </button>
</form>


<!-- BOTONES DE NAVEGACIÓN -->
<div class="d-flex gap-3">

    <!-- Volver -->
    <a href="/teachers/list" class="btn btn-secondary">
        Volver
    </a>

    <!-- Crear nuevo profesor -->
    <a href="/teachers/create" class="btn btn-success">
        Añadir profesor nuevo
    </a>

</div>

{% endblock %}
