{% extends "base.html" %}
{% block content %}
<h1 class="text-lg font-semibold mb-4">Importar horario de guardias</h1>

<form action="/imports/guards" method="post" enctype="multipart/form-data" class="card space-y-3 max-w-xl">
  <div>
    <label class="label">Excel guardias (solo G AULA / G RECREO)</label>
    <input type="file" name="file" accept=".xlsx" required class="input">
    <p class="text-xs text-gray-500 mt-1">Columnas: <b>nombre</b>, <b>día</b>, <b>franja horaria</b>. Opcional <b>hora</b>.</p>
  </div>
  <button class="btn-primary">Importar guardias</button>
</form>

<hr class="my-6">

<!-- Opcional: clases completas si decides usarlo -->
<form action="/imports/classes" method="post" enctype="multipart/form-data" class="card space-y-3 max-w-xl">
  <div>
    <label class="label">Excel horario de clases (opcional)</label>
    <input type="file" name="file" accept=".xlsx" class="input">
    <p class="text-xs text-gray-500 mt-1">Columnas: <b>nombre</b>, <b>día</b>, <b>franja horaria</b>, <b>grupo</b>, <b>aula</b>, <b>materia</b>.</p>
  </div>
  <button class="btn-muted">Importar clases</button>
</form>
{% if imported is defined %}
  <div class="mt-4 text-sm">Importados: <b>{{ imported }}</b></div>
{% endif %}
{% endblock %}
