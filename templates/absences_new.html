{% extends "base.html" %}
{% block content %}
<h1 class="text-lg font-semibold mb-4">Añadir ausencia</h1>

<form method="post" action="/absences/new" class="card space-y-4 max-w-2xl">
  <div>
    <label class="label">Profesor</label>
    <select name="teacher_id" class="input">
      <option value="">-- seleccionar --</option>
      {% for t in teachers or [] %}
        <option value="{{ t.id }}">{{ t.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="label">Fecha</label>
    <input class="input" type="date" name="date" required>
  </div>
  <div>
    <label class="label">Horas</label>
    <div class="grid grid-cols-8 gap-2">
      <label class="flex items-center gap-1"><input type="checkbox" name="all" value="1"> Todas</label>
      <label class="flex items-center gap-1"><input type="checkbox" name="hours" value="1"> 1</label>
      <label class="flex items-center gap-1"><input type="checkbox" name="hours" value="2"> 2</label>
      <label class="flex items-center gap-1"><input type="checkbox" name="hours" value="3"> 3</label>
      <label class="flex items-center gap-1"><input type="checkbox" name="hours" value="4"> 4</label>
      <label class="flex items-center gap-1"><input type="checkbox" name="hours" value="5"> 5</label>
      <label class="flex items-center gap-1"><input type="checkbox" name="hours" value="6"> 6</label>
    </div>
    <p class="text-xs text-gray-500">Se pueden marcar varias, salvo que elijas “Todas”.</p>
  </div>
  <div>
    <label class="label">Explicación</label>
    <textarea class="input" name="note" rows="2" placeholder="Opcional"></textarea>
  </div>
  <button class="btn-primary">Guardar</button>
</form>
{% endblock %}
