{% extends "base.html" %}
{% block content %}

<div class="max-w-4xl mx-auto mt-6">

  <h2 class="text-2xl font-bold mb-6">Finalizar bajas abiertas</h2>

  {% if error %}
    <div class="bg-red-100 border border-red-300 text-red-700 p-3 rounded mb-4">
      {{ error }}
    </div>
  {% endif %}

  {% if open_items %}
    <table class="min-w-full border rounded bg-white shadow">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-4 py-2 text-left">Profesor</th>
          <th class="px-4 py-2 text-left">Inicio</th>
          <th class="px-4 py-2 text-left">Fin</th>
          <th class="px-4 py-2"></th>
        </tr>
      </thead>
      <tbody>
      {% for it in open_items %}
        <tr class="border-b">
          <td class="px-4 py-2">{{ it.teacher_name }}</td>
          <td class="px-4 py-2">{{ it.start_date }}</td>
          <td class="px-4 py-2">
            <form action="/leaves/finish" method="post" class="inline">
              <input type="hidden" name="teacher_id" value="{{ it.teacher_id }}">
              <input type="date" name="end_date"
                     class="border rounded p-1" required>
          </td>
          <td class="px-4 py-2">
              <button class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">
                Finalizar baja
              </button>
            </form>
          </td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p class="text-gray-600">No hay bajas abiertas.</p>
  {% endif %}

</div>

{% endblock %}
