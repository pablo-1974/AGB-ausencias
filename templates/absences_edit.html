{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Editar ausencia</h2>

<form method="post" class="space-y-4">

  <div>
    <label class="label">Fecha</label>
    <input type="date" name="date_" class="input w-full text-lg py-2 px-3"
           value="{{ absence.date }}">
  </div>

  <div>
    <label class="label">Horas</label>
    <select name="hours_mode" class="input w-full text-lg py-2 px-3">
      <option value="all">Todas</option>
      <option value="range">Rango</option>
    </select>
  </div>

  <div class="flex gap-3">
    <div>
      <label class="label">Desde</label>
      <input type="number" name="hour_from" class="input w-full py-2 px-3">
    </div>

    <div>
      <label class="label">Hasta</label>
      <input type="number" name="hour_to" class="input w-full py-2 px-3">
    </div>
  </div>

  <div>
    <label class="label">Causa</label>
    <textarea name="cause" class="input w-full text-lg py-2 px-3">{{ absence.note }}</textarea>
  </div>

  <div class="flex justify-end gap-3">
    <a href="/absences/admin" class="btn-muted">Cancelar</a>
    <button type="submit" class="btn-primary">Guardar cambios</button>
  </div>

</form>

{% endblock %}
