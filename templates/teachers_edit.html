{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Editar profesor</h2>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="post" class="space-y-4">

  <!-- Nombre -->
  <div>
    <label class="label">Nombre</label>
    <input
      type="text"
      name="name"
      class="input w-full text-lg py-2 px-3"
      value="{{ teacher.name }}"
      required
    >
  </div>

  <!-- Email -->
  <div>
    <label class="label">Email</label>
    <input
      type="email"
      name="email"
      class="input w-full text-lg py-2 px-3"
      value="{{ teacher.email or '' }}"
    >
  </div>

  <!-- Alias -->
  <div>
    <label class="label">Alias</label>
    <input
      type="text"
      name="alias"
      class="input w-full text-lg py-2 px-3"
      value="{{ teacher.alias or '' }}"
    >
  </div>

  <!-- Estado -->
  <div>
    <label class="label">Estado</label>
    <select name="status" class="input w-full text-lg py-2 px-3">
      {% for st in estados %}
        <option value="{{ st.name }}" {% if teacher.status == st %}selected{% endif %}>
          {{ st.name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <!-- Titular -->
  <div>
    <input type="checkbox" class="form-check-input" name="titular"
           {% if teacher.titular %}checked{% endif %}>
    <label class="form-check-label">Titular</label>
  </div>

  <!-- BOTONES -->
  <div class="flex gap-3 justify-end">

    <!-- Cancelar -->
    <a href="/teachers/admin" class="btn-muted">Cancelar</a>

    <!-- Guardar -->
    <button type="submit" class="btn-primary">
      Guardar cambios
    </button>

  </div>

</form>

{% endblock %}
