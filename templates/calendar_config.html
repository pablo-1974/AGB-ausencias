{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

  <h2 class="mb-4">Calendario escolar</h2>

  <form method="post">

    <!-- Año escolar -->
    <div class="mb-3">
      <label class="form-label">Año escolar</label>
      <input type="text" name="school_year" class="form-control"
             value="{{ calendar.school_year if calendar else '' }}"
             placeholder="2024-2025" required>
    </div>

    <!-- Inicio y fin de curso -->
    <h4 class="mt-4">Curso escolar</h4>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Primer día del curso</label>
        <input type="date" name="first_day" class="form-control"
               value="{{ calendar.first_day.strftime('%Y-%m-%d') if calendar else '' }}"
               required>
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Último día del curso</label>
        <input type="date" name="last_day" class="form-control"
               value="{{ calendar.last_day.strftime('%Y-%m-%d') if calendar else '' }}"
               required>
      </div>
    </div>

    <!-- Vacaciones de Navidad -->
    <h4 class="mt-4">Vacaciones de Navidad</h4>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Inicio</label>
        <input type="date" name="xmas_start" class="form-control"
               value="{{ calendar.xmas_start.strftime('%Y-%m-%d') if calendar else '' }}"
               required>
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Fin</label>
        <input type="date" name="xmas_end" class="form-control"
               value="{{ calendar.xmas_end.strftime('%Y-%m-%d') if calendar else '' }}"
               required>
      </div>
    </div>

    <!-- Vacaciones de Semana Santa -->
    <h4 class="mt-4">Vacaciones de Semana Santa</h4>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Inicio</label>
        <input type="date" name="easter_start" class="form-control"
               value="{{ calendar.easter_start.strftime('%Y-%m-%d') if calendar else '' }}"
               required>
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Fin</label>
        <input type="date" name="easter_end" class="form-control"
               value="{{ calendar.easter_end.strftime('%Y-%m-%d') if calendar else '' }}"
               required>
      </div>
    </div>

    <!-- Festivos sueltos -->
    <h4 class="mt-4">Festivos individuales</h4>
    <p class="text-muted">Introduce fechas separadas por comas (ej: 2026-03-19, 2026-05-01)</p>

    <textarea name="other_holidays" class="form-control" rows="3">
{% if calendar and calendar.other_holidays %}
{{ calendar.other_holidays | join(', ') }}
{% endif %}
</textarea>

    <!-- Guardar -->
    <div class="mt-4">
      <button class="btn btn-primary">
        Guardar calendario
      </button>
    </div>

  </form>

</div>

{% endblock %}
