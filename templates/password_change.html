{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto card mt-8">
  <h1 class="text-xl font-semibold mb-4">Cambiar contraseña</h1>

  {% if error %}
    <div class="bg-red-100 text-red-800 p-2 rounded mb-3 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" class="space-y-4">

    <div>
      <label class="label">Contraseña actual</label>
      <input type="password" name="current_password" class="input" required>
    </div>

    <div>
      <label class="label">Nueva contraseña</label>
      <input type="password" name="new_password" class="input" required>
    </div>

    <div class="flex justify-end gap-2 mt-6">
      <a href="/" class="btn-muted">Cancelar</a>
      <button type="submit" class="btn-primary">Guardar</button>
    </div>

  </form>
</div>
{% endblock %}
