{% extends "base.html" %}
{% block content %}
<h1 class="text-lg font-semibold mb-4">Ausencias del día</h1>

<form method="get" action="/absences/manage" class="card space-y-2 max-w-md mb-4">
  <div>
    <label class="label">Fecha</label>
    <input class="input" type="date" name="date" value="{{ date_value or '' }}" required>
  </div>
  <button class="btn-primary">Ver</button>
</form>

{% if absences is defined %}
  <table class="table">
    <thead>
      <tr>
        <th>Profesor</th><th>Fecha</th><th>Horas</th><th>Nota</th><th>Causa</th><th></th>
      </tr>
    </thead>
    <tbody>
      {% for a in absences %}
        <tr>
          <td>{{ a.teacher_name }}</td>
          <td>{{ a.date }}</td>
          <td>{{ a.hours_text }}</td>
          <td>{{ a.note or '' }}</td>
          <td>{{ a.category or '' }}</td>
          <td class="whitespace-nowrap">
            <a class="btn-muted" href="/absences/{{ a.id }}/edit">Modificar</a>
            <form class="inline" method="post" action="/absences/{{ a.id }}/delete" onsubmit="return confirm('¿Borrar ausencia?')">
              <button class="btn-muted">Borrar</button>
            </form>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endif %}
{% endblock %}
