{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Añadir profesor</h2>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="post" class="space-y-4">

  <!-- Nombre -->
  <div>
    <label for="inpName" class="label">Nombre</label>
    <input
      id="inpName"
      name="name"
      type="text"
      class="input w-full text-lg py-2 px-3"
      required
    >
  </div>

  <!-- Email -->
  <div>
    <label for="inpEmail" class="label">Email</label>
    <input
      id="inpEmail"
      name="email"
      type="email"
      class="input w-full text-lg py-2 px-3"
    >
  </div>

  <!-- Alias -->
  <div>
    <label for="inpAlias" class="label">Alias</label>
    <input
      id="inpAlias"
      name="alias"
      type="text"
      class="input w-full text-lg py-2 px-3"
    >
  </div>

  <!-- Estado -->
  <div>
    <label for="selStatus" class="label">Estado</label>
    <select id="selStatus" name="status" class="input w-full text-lg py-2 px-3">
      {% for st in estados %}
      <option value="{{ st.name }}">{{ st.name }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Titular -->
  <div class="form-check mb-4">
    <input class="form-check-input" type="checkbox" id="chkTitular" name="titular">
    <label for="chkTitular" class="form-check-label">Titular</label>
  </div>

  <!-- BOTONES -->
  <div class="flex gap-3 justify-end">

    <!-- Cancelar -->
    <a href="/teachers/admin" class="btn-muted">Cancelar</a>

    <!-- Guardar -->
    <button type="submit" class="btn-primary">
      Crear profesor
    </button>

  </div>

</form>

{% endblock %}
