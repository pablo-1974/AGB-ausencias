{% extends "base.html" %}
{% block content %}
<h1 class="text-lg font-semibold mb-4">Asignar sustitución</h1>

<form method="post" action="/substitutions/new" class="card space-y-3 max-w-2xl">
  <div>
    <label class="label">Profesor de baja</label>
    <select name="teacher_id" class="input">
      <option value="">-- seleccionar --</option>
      {% for t in leaves_teachers or [] %}
        <option value="{{ t.id }}">{{ t.name }}</option>
      {% endfor %}
    </select>
    <p class="text-xs text-gray-500">Solo aparecen profesores con baja activa.</p>
  </div>
  <div>
    <label class="label">Fecha inicio sustitución</label>
    <input type="date" class="input" name="start_date" required>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
    <div>
      <label class="label">Nombre sustituto</label>
      <input class="input" type="text" name="substitute_name" placeholder="Nombre y apellidos" required>
    </div>
    <div>
      <label class="label">Email sustituto (opcional)</label>
      <input class="input" type="email" name="substitute_email" placeholder="si lo conoces">
    </div>
  </div>
  <button class="btn-primary">Asignar</button>
</form>
{% endblock %}
