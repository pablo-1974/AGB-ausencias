{% extends "base.html" %}
{% block content %}
<h1 class="text-lg font-semibold mb-4">Cerrar baja</h1>
<form method="post" action="/leaves/close" class="card space-y-3 max-w-xl">
  <div>
    <label class="label">Profesor de baja</label>
    <select name="teacher_id" class="input">
      <option value="">-- seleccionar --</option>
      {% for t in leaves_teachers or [] %}
        <option value="{{ t.id }}">{{ t.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="label">Fecha fin</label>
    <input class="input" type="date" name="end_date" required>
  </div>
  <button class="btn-primary">Cerrar baja</button>
</form>
{% endblock %}
