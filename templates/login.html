{% extends "base.html" %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-md rounded-xl p-8 text-white"
       style="background: linear-gradient(135deg, rgba(124,58,237,0.85), rgba(168,85,247,0.85));">
    <div class="flex flex-col items-center gap-2 mb-6">
      <img src="{{ logo_path }}" class="h-12 w-12" alt="logo">
      <h1 class="text-2xl font-bold">Ausencias de profesores</h1>
      <p class="text-sm opacity-90">IES Antonio García Bellido</p>
    </div>
    <form action="/login" method="post" class="space-y-3">
      <div>
        <label class="label">Email</label>
        <input class="input text-black" type="email" name="email" required>
      </div>
      <div>
        <label class="label">Contraseña</label>
        <input class="input text-black" type="password" name="password" required>
      </div>
      <button class="btn-primary w-full">Entrar</button>
    </form>
    <div class="mt-4 text-xs opacity-90">
      Si es el primer acceso y la base de datos está vacía, crea el administrador en
      <a class="underline" href="/register-first-admin">este enlace</a>.
    </div>
  </div>
</div>
{% endblock %}
