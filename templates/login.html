<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-purple-200 via-purple-300 to-indigo-300 flex items-center justify-center">

    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">

        <div class="flex flex-col items-center mb-6">
            <img src="/static/logo.png" class="h-20 mb-4">
            <h1 class="text-2xl font-bold text-indigo-700">Ausencias de profesores</h1>
            <p class="text-gray-600">IES Antonio García Bellido</p>
        </div>

        {% if error %}
        <div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4">{{ error }}</div>
        {% endif %}

        {% if register_mode %}
        <form method="POST" action="/register" class="space-y-4">
            <input name="name" placeholder="Nombre completo" class="w-full border rounded px-3 py-2" required>
            <input name="email" placeholder="Email" type="email" class="w-full border rounded px-3 py-2" required>
            <input name="password" type="password" placeholder="Contraseña" class="w-full border rounded px-3 py-2" required>

            <button class="bg-indigo-600 text-white w-full py-2 rounded">Crear Admin</button>
        </form>
        {% else %}
        <form method="POST" action="/login" class="space-y-4">
            <input name="email" placeholder="Email" type="email" class="w-full border rounded px-3 py-2" required>
            <input name="password" type="password" placeholder="Contraseña" class="w-full border rounded px-3 py-2" required>

            <button class="bg-indigo-600 text-white w-full py-2 rounded">Entrar</button>
        </form>
        {% endif %}
    </div>

</body>
</html>
