{% extends "base.html" %}
{% block content %}
<h1 class="text-lg font-semibold mb-4">Parte diario de ausencias</h1>

<form method="post" action="/reports/daily" class="card space-y-3 max-w-2xl">
  <div>
    <label class="label">Fecha</label>
    <input class="input" type="date" name="fecha" value="{{ today or '' }}" required>
  </div>
  <div>
    <label class="label">Observaciones</label>
    <input class="input" type="text" name="observaciones" placeholder="Opcional: añade aquí un texto">
  </div>
  <button class="btn-primary">Generar PDF</button>
</form>
{% endblock %}
