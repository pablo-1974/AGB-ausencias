{% extends "base.html" %}
{% block content %}

<h2 class="text-xl font-bold mb-6">Parte diario</h2>

<form method="GET" action="/reports/daily" class="space-y-4 mb-6">
    <input type="date" name="date" value="{{ date }}" class="border px-3 py-2 rounded">
    <button class="bg-indigo-600 text-white px-4 py-2 rounded">Ver</button>
</form>

<form method="GET" action="/reports/daily/pdf">

    <input type="hidden" name="date" value="{{ date }}">

    <label class="block">
        Observaciones:
        <input name="observations" class="border px-3 py-2 rounded w-full">
    </label>

    <button class="bg-indigo-600 text-white px-4 py-2 rounded mt-4">
        Generar PDF
    </button>
</form>

{% endblock %}
